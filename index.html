<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vanterpot: Навигатор Можайск</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <header class="sticky-header">
        <div class="controls">
            <input type="date" id="travel-date">
            <div class="button-group">
                <button id="btn-forward">🏡 На дачу</button>
                <button id="btn-return">🏙️ Домой</button>
            </div>
        </div>
    </header>

    <main id="capture-area">
        <div id="results" class="results-container">
            <div class="welcome-msg">Выберите дату и направление, чтобы найти стыковки.</div>
        </div>
    </main>

    <button id="btn-share" class="fab-share" title="Поделиться">
        <svg viewBox="0 0 24 24" width="24" height="24"><path fill="white" d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92z"/></svg>
    </button>

    <script src="app.js"></script>
</body>
</html>
